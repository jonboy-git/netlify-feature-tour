# Network settings
bind 0.0.0.0
port 6379
timeout 300
tcp-keepalive 60

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Persistence settings (optimized for performance)
save 900 1
save 300 10
save 60 10000

# Disable RDB persistence for better performance (optional)
# save ""

# AOF persistence (more durable)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client settings
maxclients 10000

# Security (add password in production)
# requirepass your_secure_password

# Key expiration settings
hz 10

# Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG ""

# Lua scripting
lua-time-limit 5000

# Latency monitoring
latency-monitor-threshold 100

# Memory optimization
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog sparse representation
hll-sparse-max-bytes 3000

# Streams settings
stream-node-max-bytes 4096
stream-node-max-entries 100

# Active rehashing
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# TCP listen backlog
tcp-backlog 511

# Unix socket settings (if needed)
# unixsocket /tmp/redis.sock
# unixsocketperm 700

# Logging
loglevel notice
logfile /var/log/redis/redis-server.log

# Database settings
databases 16

# Notifications for keyspace events (useful for cache invalidation)
notify-keyspace-events "Ex"