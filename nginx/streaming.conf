user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Load RTMP module for live streaming
load_module modules/ngx_rtmp_module.so;

events {
    worker_connections 1024;
    use epoll;
}

# RTMP configuration for live streaming
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        allow publish all;
        allow play all;

        # Live streaming application
        application live {
            live on;
            
            # Enable HLS
            hls on;
            hls_path /var/www/streams/hls;
            hls_fragment 3;
            hls_playlist_length 60;
            hls_continuous on;
            hls_cleanup on;
            hls_nested on;
            
            # Enable DASH
            dash on;
            dash_path /var/www/streams/dash;
            dash_fragment 3;
            dash_playlist_length 60;
            dash_nested on;
            dash_cleanup on;

            # Authentication (optional)
            # on_publish http://web1/api/auth/publish;
            # on_play http://web1/api/auth/play;

            # Record streams
            record all;
            record_path /var/www/streams/recordings;
            record_unique on;
            record_suffix .flv;

            # Transcoding for multiple bitrates
            exec ffmpeg -i rtmp://localhost:1935/live/$name
              -c:a aac -b:a 128k -c:v libx264 -b:v 2500k -f flv -preset veryfast -profile:v baseline rtmp://localhost:1935/hls/$name_720p
              -c:a aac -b:a 128k -c:v libx264 -b:v 1000k -f flv -preset veryfast -profile:v baseline rtmp://localhost:1935/hls/$name_480p
              -c:a aac -b:a 64k -c:v libx264 -b:v 400k -f flv -preset veryfast -profile:v baseline rtmp://localhost:1935/hls/$name_240p;
        }

        # HLS streams
        application hls {
            live on;
            hls on;
            hls_path /var/www/streams/hls;
            hls_fragment 3;
            hls_playlist_length 60;
            hls_continuous on;
            hls_cleanup on;
            hls_nested on;

            # Adaptive bitrate streaming
            hls_variant _720p BANDWIDTH=2628000,RESOLUTION=1280x720;
            hls_variant _480p BANDWIDTH=1128000,RESOLUTION=854x480;
            hls_variant _240p BANDWIDTH=464000,RESOLUTION=426x240;
        }
    }
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name _;
        root /var/www/streams;

        # CORS headers for all streaming content
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
        add_header Access-Control-Expose-Headers 'Content-Length,Content-Range';

        # HLS streams
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /var/www/streams;
            add_header Cache-Control no-cache;
            
            # Enable range requests
            add_header Accept-Ranges bytes;
        }

        # DASH streams
        location /dash {
            root /var/www/streams;
            add_header Cache-Control no-cache;
            
            # DASH specific MIME types
            location ~ \.mpd$ {
                add_header Content-Type application/dash+xml;
            }
            location ~ \.m4s$ {
                add_header Content-Type video/iso.segment;
            }
        }

        # VOD content
        location /vod {
            root /var/www/streams;
            mp4;
            mp4_buffer_size 1m;
            mp4_max_buffer_size 5m;
            
            # Cache video files
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # Recordings
        location /recordings {
            root /var/www/streams;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }

        # Statistics page
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
            add_header Refresh "3; $request_uri";
            allow 172.20.0.0/16;
            deny all;
        }

        location /stat.xsl {
            root /usr/local/nginx/html;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "streaming-server-healthy\n";
            add_header Content-Type text/plain;
        }
    }
}